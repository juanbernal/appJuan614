    <!-- CÓDIGO DE RASTREO PARA DIOS MAS GYM -->
    <script>
      window.addEventListener('load', function() {
        var ANALYTICS_URL = "https://script.google.com/macros/s/AKfycbwNX-T5wawLrYaTnJ0PcN_xA8sp0LIXThDA3jqkDhR3IdjSlnqRif8rUEx_e9e1xSsd3Q/exec";
        
        var payload = {
          action: "trackEvent",
          event: "post_view", 
          data: { 
            title: document.title,
            artist: "Externa" 
          },
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent
        };

        fetch(ANALYTICS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        }).catch(function(e) {
          console.log("Analytics Error:", e);
        });
      });
    </script>
    <!-- FIN DEL CÓDIGO DE RASTREO -->

    <script>
      let refreshing = false;
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered:', registration);
          });
        });

        // Handle reloading when the new service worker takes over
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          window.location.reload();
          refreshing = true;
        });
      }
    </script>
